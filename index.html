<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vegar Efteland Melhus</title>
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Critical: background + theme before first paint -->
  <style>
    html, body { background: #ffffff; }
    html[data-theme="dark"], html[data-theme="dark"] body { background: #0d0d0d; }
  </style>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var isDark = saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>

  <style>
    /* ─── Tokens ──────────────────────────────────────────── */
    :root {
      --bg:          #ffffff;
      --fg:          #0a0a0a;
      --muted:       #999999;
      --border:      #e8e8e8;
      --tag-bg:      #0a0a0a;
      --tag-fg:      #ffffff;
      --nav-bg:      rgba(255, 255, 255, 0.88);
      --hover-shadow: 0 6px 24px rgba(0, 0, 0, 0.13);
      --font:        'Inter', system-ui, sans-serif;
      --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
      --theme-trans: 350ms ease;
    }
    [data-theme="dark"] {
      --bg:          #0d0d0d;
      --fg:          #efefef;
      --muted:       #606060;
      --border:      #242424;
      --tag-bg:      #000000;
      --tag-fg:      #ffffff;
      --nav-bg:      rgba(13, 13, 13, 0.88);
      --hover-shadow: 0 0 20px rgba(255, 255, 255, 0.12);
    }

    /* ─── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background var(--theme-trans), color var(--theme-trans);
    }

    /* ─── Top nav ─────────────────────────────────────────── */
    .top-nav {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: none;
    }

    .nav-pill {
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 100px;
      padding: 0 18px;
      height: 36px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      pointer-events: all;
      opacity: 0;
      animation: contentIn 400ms var(--ease-out) 60ms forwards;
      transition: background var(--theme-trans), border-color var(--theme-trans), box-shadow 250ms ease;
    }
    [data-theme="dark"] .nav-pill { border-color: rgba(255, 255, 255, 0.07); }
    .nav-pill:hover { box-shadow: var(--hover-shadow); }

    /* ─── Theme toggle ────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      width: 36px;
      height: 36px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 100px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      opacity: 0;
      animation: contentIn 400ms var(--ease-out) 60ms forwards;
      transition: color 180ms ease, background var(--theme-trans),
                  border-color var(--theme-trans), box-shadow 250ms ease;
    }
    .theme-toggle:hover { color: var(--fg); box-shadow: var(--hover-shadow); }
    [data-theme="dark"] .theme-toggle { border-color: rgba(255, 255, 255, 0.07); }

    .theme-toggle svg {
      position: absolute;
      width: 15px;
      height: 15px;
      transition: opacity 250ms ease, transform 420ms var(--ease-out);
    }
    .theme-toggle .icon-moon { opacity: 1; transform: translateY(0); }
    .theme-toggle .icon-sun  { opacity: 0; transform: rotate(90deg); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: translateY(-6px); }
    [data-theme="dark"] .theme-toggle .icon-sun  { opacity: 1; transform: rotate(0deg); }

    /* ─── Main content ────────────────────────────────────── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .content > * {
      opacity: 0;
      animation: contentIn 400ms var(--ease-out) both;
    }
    .content > *:nth-child(1) { animation-delay: 140ms; }
    .content > *:nth-child(2) { animation-delay: 210ms; }
    .content > *:nth-child(3) { animation-delay: 270ms; }

    @keyframes contentIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Tag pill */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--tag-bg);
      color: var(--tag-fg);
      font-size: 12.5px;
      font-weight: 500;
      padding: 4px 12px 4px 10px;
      border-radius: 100px;
      user-select: none;
    }

    .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.55;
      flex-shrink: 0;
      animation: dotPulse 2.4s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.4); }
    }

    /* Heading */
    .heading {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
    }

    /* Subtitle */
    .subtitle {
      font-size: 13.5px;
      color: var(--muted);
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.8em;
      background: var(--muted);
      margin-left: 2px;
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 0.8s ease infinite;
    }

    @keyframes blink {
      0%, 40%   { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    /* ─── Footer ──────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0;
      animation: contentIn 400ms var(--ease-out) 360ms forwards;
    }

    /* ─── Reduced motion ──────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .nav-pill, .theme-toggle, .content > *, footer {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .tag-dot { animation: none !important; }
      .cursor  { animation: none !important; }
    }
  </style>
</head>
<body>

  <nav class="top-nav" aria-label="Site">
    <div class="nav-pill">Vegar Efteland Melhus</div>
  </nav>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <main class="content">
    <span class="tag" aria-label="Status: Coming Soon">
      <span class="tag-dot" aria-hidden="true"></span>
      Coming Soon
    </span>
<p class="subtitle">Site is temporarily down or under maintenance<span class="cursor" aria-hidden="true"></span></p>
  </main>

  <footer>©2026</footer>

  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var isDark = document.documentElement.getAttribute("data-theme") === "dark";
      var next = isDark ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });
  </script>

</body>
</html>
